<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Storylio XML Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050816;
      --card-bg: #0b1020;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.18);
      --accent-strong: #4f46e5;
      --border-subtle: #1f2933;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        Segoe UI, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f2937 0, #050816 52%, #000 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: radial-gradient(circle at top left, #111827 0, #020617 60%);
      border-radius: 26px;
      padding: 22px 20px 18px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(18px);
    }

    @media (max-width: 720px) {
      .card {
        padding: 18px 14px 16px;
        border-radius: 22px;
      }
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 2px 9px 3px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.55);
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .panel {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), #020617);
      border-radius: var(--radius-lg);
      padding: 16px 14px 14px;
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #c7d2fe;
      margin-bottom: 6px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    input,
    textarea {
      width: 100%;
      background: #020617;
      border-radius: var(--radius-md);
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 9px 11px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.5);
      background: #020617;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > div {
      flex: 1;
    }

    @media (max-width: 640px) {
      .row {
        flex-direction: column;
      }
    }

    .pill-row {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      margin-bottom: 4px;
    }

    .pill {
      position: relative;
    }

    .pill input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .pill span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px 6px;
      border-radius: 999px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text-muted);
      border: 1px solid transparent;
      transition: background 0.15s, color 0.15s, border 0.15s, transform 0.08s;
      white-space: nowrap;
    }

    .pill span:hover {
      border-color: rgba(148, 163, 184, 0.6);
    }

    .pill input:checked + span {
      background: radial-gradient(circle at top left, #4f46e5, #6366f1);
      color: white;
      border-color: rgba(129, 140, 248, 0.9);
      transform: translateY(0);
    }

    .pill span small {
      font-size: 0.7rem;
      opacity: 0.85;
    }

    .story-group {
      padding: 10px;
      border-radius: 16px;
      background: radial-gradient(circle at top left, #020617, #020617 40%, #020617 100%);
      border: 1px solid rgba(31, 41, 55, 0.9);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .story-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn-main-wrap {
      margin-top: 8px;
      display: flex;
      justify-content: center;
    }

    .btn-main {
      border-radius: 999px;
      border: none;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
      border: 1px solid rgba(191, 219, 254, 0.4);
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.65);
      transition: background 0.15s, transform 0.08s ease-out, box-shadow 0.15s;
      min-width: 260px;
      justify-content: center;
    }

    .btn-main span.icon {
      font-size: 1rem;
      opacity: 0.9;
    }

    .btn-main:hover {
      box-shadow: 0 22px 46px rgba(37, 99, 235, 0.8);
    }

    .btn-main:active {
      transform: translateY(1px);
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.9);
    }

    .footer-hint {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="header-row">
        <div>
          <h1>
            Storylio XML Generator
            <span class="badge">POD</span>
          </h1>
          <div class="subtitle">Wenige Felder ausfüllen, Klick – beide XML-Dateien fertig.</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Eingabe</div>

        <div>
          <label for="address">Versandadresse</label>
          <textarea
            id="address"
            placeholder="z. B.&#10;Daniela Hönig, Pöhlbergsiedlung 5, 09456 Annaberg-B., Deutschland"
          ></textarea>
        </div>

        <div class="row">
          <div>
            <label for="orderNumber">Shopify-Bestellnummer</label>
            <input
              id="orderNumber"
              type="text"
              placeholder="#St219732156"
              autocomplete="off"
            />
          </div>
          <div>
            <label for="childName">Name des Kindes</label>
            <input
              id="childName"
              type="text"
              placeholder="Nina"
              autocomplete="off"
            />
          </div>
        </div>

        <div>
          <label>Einband</label>
          <div class="pill-row">
            <label class="pill">
              <input type="radio" name="bookType" value="HC" checked />
              <span>Hardcover</span>
            </label>
            <label class="pill">
              <input type="radio" name="bookType" value="SC" />
              <span>Softcover</span>
            </label>
          </div>
        </div>

        <div class="story-group">
          <label>Geschichte</label>
          <div class="story-row">
            <label class="pill">
              <input type="radio" name="storyType" value="pferde" checked />
              <span>🐴 Pferde</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="eisprinzessin" />
              <span>❄️ Eisprinzessin</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="meerjungfrauen" />
              <span>🧜‍♀️ Meerjungfrau</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="einhörner" />
              <span>🦄 Einhorn</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="prinzessin" />
              <span>👑 Prinzessin</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="feuerwehr" />
              <span>🚒 Feuerwehr</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="astronaut" />
              <span>🚀 Astronaut</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="dinosaurier" />
              <span>🦖 Dinosaurier</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="superheld" />
              <span>🦸‍♂️ Superheld</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="ritter" />
              <span>⚔️ Ritter</span>
            </label>
            <label class="pill">
              <input type="radio" name="storyType" value="pirat" />
              <span>🏴‍☠️ Pirat</span>
            </label>
          </div>
        </div>

        <div class="btn-main-wrap">
          <button class="btn-main" onclick="downloadBoth()">
            <span class="icon">⬇️</span>
            <span>Beide XML-Dateien herunterladen</span>
          </button>
        </div>

        <div class="footer-hint">
          Mastering zuerst in <code>/mastering</code> hochladen, danach DropShipOrder in
          <code>/order</code>. ISBN = 9789000 + Bestellnummer (nur Ziffern), Umfang 36 Seiten.
        </div>
      </div>
    </div>
  </div>

  <script>
    const defaults = {
      fromCompany: "Storylio",
      fromCompanyNumber: "31174",
      fromPerson: "Amir Schariaty",
      fromEmail: "storylio.hilfe@gmail.com",
      isbnPrefix: "9789000",
      pages: 36,
    };

    const STORY_TITLES = {
      pferde: "NAME - Der Kampf um das Lieblingspferd",
      eisprinzessin: "NAME - Die Eisprinzessin und das Herz des Winters",
      meerjungfrauen: "NAME - Die Meerjungfrau",
      einhörner: "NAME - Die Reise zum Regenbogen",
      prinzessin: "NAME - Die Prinzessin",
      feuerwehr: "NAME - Das große Abenteuer im Einsatz",
      astronaut: "NAME - Der Astronaut",
      dinosaurier: "NAME - Eine magische Reise in eine uralte Welt",
      superheld: "NAME - Der Superheld in der Stadt",
      ritter: "NAME - Der Ritter",
      pirat: "NAME - Der Pirat",
    };

    function pad2(n) {
      return n.toString().padStart(2, "0");
    }

    function getNow() {
      const d = new Date();
      const year = d.getFullYear();
      const month = pad2(d.getMonth() + 1);
      const day = pad2(d.getDate());
      const hours = pad2(d.getHours());
      const minutes = pad2(d.getMinutes());
      return {
        date: `${year}${month}${day}`,
        time: `${hours}:${minutes}`,
      };
    }

    function sanitizeOrderNumber(raw) {
      if (!raw) return "";
      return raw.trim().replace(/^#/, "");
    }

    function extractDigits(str) {
      return (str || "").replace(/\D+/g, "");
    }

    function parseAddress(raw) {
      const parts = (raw || "")
        .split("\n")
        .join(" ")
        .split(",")
        .map((p) => p.trim())
        .filter((p) => p.length > 0);

      const [line1 = "", street = "", zipCity = "", country = ""] = parts;

      let zip = "";
      let city = "";
      if (zipCity) {
        const m = zipCity.match(/^(\S+)\s+(.+)$/);
        if (m) {
          zip = m[1];
          city = m[2];
        } else {
          city = zipCity;
        }
      }

      const countryMap = {
        deutschland: "DE",
        germany: "DE",
        schweiz: "CH",
        switzerland: "CH",
        österreich: "AT",
        austria: "AT",
      };

      let countryCode = "";
      const lower = country.toLowerCase();
      Object.keys(countryMap).forEach((key) => {
        if (lower.includes(key)) {
          countryCode = countryMap[key];
        }
      });
      if (!countryCode && country.length === 2) {
        countryCode = country.toUpperCase();
      }

      return {
        addressLine1: line1,
        street,
        zip,
        city,
        country: countryCode || country || "",
      };
    }

    function buildIsbn() {
      const orderRaw = sanitizeOrderNumber(
        document.getElementById("orderNumber").value
      );
      const suffixDigits = extractDigits(orderRaw);
      return defaults.isbnPrefix + suffixDigits;
    }

    function getSelectedStoryType() {
      const el = document.querySelector('input[name="storyType"]:checked');
      return el ? el.value : "pferde";
    }

    function getStoryTitle(childName, storyType) {
      const template =
        STORY_TITLES[storyType] || "NAME - Deine Geschichte";
      const name = childName && childName.trim() ? childName.trim() : "NAME";
      return template.replace("NAME", name);
    }

    function buildMasteringXml() {
      const { date, time } = getNow();
      const orderRaw = sanitizeOrderNumber(
        document.getElementById("orderNumber").value
      );
      const childName = document.getElementById("childName").value.trim();
      const isbn = buildIsbn();

      const bookType = document.querySelector(
        'input[name="bookType"]:checked'
      ).value;

      const storyType = getSelectedStoryType();
      const titleText = getStoryTitle(childName, storyType);

      const pages = defaults.pages;
      const isHC = bookType === "HC";
      const coverPaper = isHC ? "150g_BD100" : "275g_BD100";
      const textPaper = "140g_BD100";

      const coverFile = `${isbn}_Cover_${bookType}.pdf`;
      const textFile = `${isbn}_Bookblock.pdf`;

      const xml = `<?xml version="1.0" encoding="UTF-8"?>
<CPI>
  <Header>
    <FromCompany>${defaults.fromCompany}</FromCompany>
    <FromCompanyNumber>${defaults.fromCompanyNumber}</FromCompanyNumber>
    <SentDate>${date}</SentDate>
    <SentTime>${time}</SentTime>
    <FromPerson>${defaults.fromPerson}</FromPerson>
    <FromEmail>${defaults.fromEmail}</FromEmail>
  </Header>

  <Title>
    <Type>import</Type>
    <ISBN>${isbn}</ISBN>
    <Author>${defaults.fromCompany}</Author>
    <Title>${titleText}</Title>
    <Height>200</Height>
    <Width>200</Width>
    <BookType>${bookType}</BookType>
    <Backing>straight</Backing>

    <Cover>
      <Pages>1</Pages>
      <Lamination>glossy</Lamination>
      <PaperName>${coverPaper}</PaperName>
      <FileName>${coverFile}</FileName>
      <BarcodePosition>bottom-right</BarcodePosition>
    </Cover>

    <Text>
      <TotalExtent>${pages}</TotalExtent>
      <ColourPages>${pages}</ColourPages>
      <HeadTailBand>${isHC ? "none" : "none"}</HeadTailBand>
      <Ribbon>${isHC ? "none" : "none"}</Ribbon>
      <PaperName>${textPaper}</PaperName>
      <FileName>${textFile}</FileName>
    </Text>
  </Title>
</CPI>`;

      return { xml, isbn, orderNumber: orderRaw };
    }

    function buildOrderXml() {
      const { date, time } = getNow();
      const orderRaw = sanitizeOrderNumber(
        document.getElementById("orderNumber").value
      );
      const isbn = buildIsbn();
      const addressRaw = document.getElementById("address").value;
      const addr = parseAddress(addressRaw);

      const xml = `<?xml version="1.0" encoding="utf-8"?>
<CPI>
  <Header>
    <FromCompany>${defaults.fromCompany}</FromCompany>
    <FromCompanyNumber>${defaults.fromCompanyNumber}</FromCompanyNumber>
    <SentDate>${date}</SentDate>
    <SentTime>${time}</SentTime>
    <FromPerson>${defaults.fromPerson}</FromPerson>
    <FromEmail>${defaults.fromEmail}</FromEmail>
  </Header>

  <DropShipOrder>
    <OrderNumber>${orderRaw}</OrderNumber>
    <Shipping>DHL Standard</Shipping>
    <InvoiceFile></InvoiceFile>

    <Product>
      <EAN>${isbn}</EAN>
      <Copies>1</Copies>
    </Product>

    <ShippingAddress>
      <AddressLine1>${addr.addressLine1}</AddressLine1>
      <AddressLine2></AddressLine2>
      <Street>${addr.street}</Street>
      <ZIP>${addr.zip}</ZIP>
      <City>${addr.city}</City>
      <Phone></Phone>
      <Country>${addr.country}</Country>
    </ShippingAddress>
  </DropShipOrder>
</CPI>`;

      return { xml, isbn, orderNumber: orderRaw };
    }

    function downloadTextFile(filename, content) {
      const blob = new Blob([content], { type: "application/xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadBoth() {
      const mastering = buildMasteringXml();
      const order = buildOrderXml();

      const masteringFilename = `${mastering.isbn}_MasteringOrder.xml`;
      const orderFilename = `CPI_DropShipOrder_${order.orderNumber || "Order"}.xml`;

      downloadTextFile(masteringFilename, mastering.xml);
      downloadTextFile(orderFilename, order.xml);
    }
  </script>
</body>
</html>
