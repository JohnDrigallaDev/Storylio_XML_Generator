<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Storylio XML Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #050816;
      --card: #0b1020;
      --accent: #4f46e5;
      --accent-strong: #6366f1;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --error: #ef4444;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        Segoe UI, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f2937, #050816 60%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(135deg, #020617, #020617);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--text);
      margin-bottom: 14px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.6);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row > div {
      flex: 1;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .pill input {
      display: none;
    }

    .pill span {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      transition: 0.15s;
    }

    .pill input:checked + span {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
      border-color: transparent;
    }

    .btn {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      border: none;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 20px 45px rgba(79, 70, 229, 0.7);
    }

    .btn:hover {
      box-shadow: 0 25px 55px rgba(79, 70, 229, 0.9);
    }

    .message {
      margin-top: 12px;
      font-size: 0.85rem;
      text-align: center;
    }

    .error {
      color: var(--error);
    }

    .success {
      color: var(--success);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Storylio XML Generator</h1>
    <div class="subtitle">Shopify-Daten einfügen → 2 CPI-XMLs herunterladen</div>

    <label>Versandadresse (Shopify Copy-Paste)</label>
    <textarea id="address"
      placeholder="Elena Rein, Teichtorstraße 2, DG, 37627 Stadtoldendorf, Deutschland, +491729391012"></textarea>

    <div class="row">
      <div>
        <label>Shopify-Bestellnummer</label>
        <input id="orderNumber" placeholder="#St221032156" />
      </div>
      <div>
        <label>Name des Kindes</label>
        <input id="childName" placeholder="Annica" />
      </div>
    </div>

    <label>Einband</label>
    <div class="pill-row">
      <label class="pill">
        <input type="radio" name="bookType" value="HC" checked />
        <span>Hardcover</span>
      </label>
      <label class="pill">
        <input type="radio" name="bookType" value="SC" />
        <span>Softcover</span>
      </label>
    </div>

    <label>Geschichte</label>
    <div class="pill-row">
      <label class="pill"><input type="radio" name="story" value="pferde" checked /><span>🐴 Pferde</span></label>
      <label class="pill"><input type="radio" name="story" value="eis" /><span>❄️ Eisprinzessin</span></label>
      <label class="pill"><input type="radio" name="story" value="meer" /><span>🧜‍♀️ Meerjungfrau</span></label>
      <label class="pill"><input type="radio" name="story" value="einhorn" /><span>🦄 Einhorn</span></label>
      <label class="pill"><input type="radio" name="story" value="prinzessin" /><span>👑 Prinzessin</span></label>
      <label class="pill"><input type="radio" name="story" value="feuerwehr" /><span>🚒 Feuerwehr</span></label>
      <label class="pill"><input type="radio" name="story" value="astronaut" /><span>🚀 Astronaut</span></label>
      <label class="pill"><input type="radio" name="story" value="dino" /><span>🦖 Dino</span></label>
      <label class="pill"><input type="radio" name="story" value="superheld" /><span>🦸‍♂️ Superheld</span></label>
      <label class="pill"><input type="radio" name="story" value="ritter" /><span>⚔️ Ritter</span></label>
      <label class="pill"><input type="radio" name="story" value="pirat" /><span>🏴‍☠️ Pirat</span></label>
    </div>

    <button class="btn" onclick="generate()">Beide XML-Dateien herunterladen</button>

    <div id="msg" class="message"></div>
  </div>

<script>
/* ---------------- CONFIG ---------------- */
const CFG = {
  company: "Storylio",
  companyNo: "90004899",
  person: "Amir Schariaty",
  email: "storylio.hilfe@gmail.com",
  isbnPrefix: "9789000",
  pages: 36
};

const STORY_TITLES = {
  pferde: "NAME - Der Kampf um das Lieblingspferd",
  eis: "NAME - Die Eisprinzessin und das Herz des Winters",
  meer: "NAME - Die Meerjungfrau",
  einhorn: "NAME - Die Reise zum Regenbogen",
  prinzessin: "NAME - Die Prinzessin",
  feuerwehr: "NAME - Das große Abenteuer im Einsatz",
  astronaut: "NAME - Der Astronaut",
  dino: "NAME - Eine magische Reise in eine uralte Welt",
  superheld: "NAME - Der Superheld in der Stadt",
  ritter: "NAME - Der Ritter",
  pirat: "NAME - Der Pirat"
};

/* ---------------- HELPERS ---------------- */
function now() {
  const d = new Date();
  return {
    date: d.toISOString().slice(0,10).replace(/-/g,""),
    time: d.toTimeString().slice(0,5)
  };
}

function cleanOrder(o) {
  return o.replace(/^#/, "").trim();
}

function digits(s) {
  return s.replace(/\D+/g,"");
}

/* ---------------- ADDRESS PARSER ---------------- */
function parseAddress(raw) {
  const parts = raw.split(",").map(p=>p.trim()).filter(Boolean);
  if (parts.length < 3) throw "Adresse unvollständig";

  const name = parts[0];
  const street = parts[1];

  let phone = "";
  for (const p of parts) {
    if (/^\+?\d[\d\s\-]{6,}$/.test(p)) {
      phone = p.replace(/\s+/g,"");
      break;
    }
  }

  const zipCity = parts.find(p=>/^\d{4,6}\s+/.test(p));
  if (!zipCity) throw "PLZ / Ort nicht erkannt";

  const [, zip, city] = zipCity.match(/^(\d{4,6})\s+(.+)$/);

  const map = {
    deutschland:"DE", germany:"DE",
    schweiz:"CH", switzerland:"CH",
    österreich:"AT", austria:"AT"
  };

  let country = "";
  for (const p of parts) {
    const l = p.toLowerCase();
    for (const k in map) {
      if (l.includes(k)) country = map[k];
    }
  }
  if (!country) throw "Land nicht erkannt";

  return { name, street, zip, city, phone, country };
}

/* ---------------- MAIN ---------------- */
function generate() {
  const msg = document.getElementById("msg");
  msg.textContent = "";
  msg.className = "message";

  try {
    const addr = parseAddress(document.getElementById("address").value);
    const order = cleanOrder(document.getElementById("orderNumber").value);
    const child = document.getElementById("childName").value.trim() || "NAME";

    if (!order) throw "Bestellnummer fehlt";

    const isbn = CFG.isbnPrefix + digits(order);
    const {date,time} = now();

    const bookType = document.querySelector("input[name=bookType]:checked").value;
    const storyKey = document.querySelector("input[name=story]:checked").value;
    const title = STORY_TITLES[storyKey].replace("NAME", child);

    /* -------- MASTERING XML -------- */
    const mastering = `<?xml version="1.0" encoding="UTF-8"?>
<CPI>
<Header>
<FromCompany>${CFG.company}</FromCompany>
<FromCompanyNumber>${CFG.companyNo}</FromCompanyNumber>
<SentDate>${date}</SentDate>
<SentTime>${time}</SentTime>
<FromPerson>${CFG.person}</FromPerson>
<FromEmail>${CFG.email}</FromEmail>
</Header>
<Title>
<Type>import</Type>
<ISBN>${isbn}</ISBN>
<Author>${CFG.company}</Author>
<Title>${title}</Title>
<Height>200</Height>
<Width>200</Width>
<BookType>${bookType}</BookType>
<Backing>straight</Backing>
<Cover>
<Pages>1</Pages>
<Lamination>glossy</Lamination>
<PaperName>${bookType==="HC"?"150g_BD100":"275g_BD100"}</PaperName>
<FileName>${isbn}_Cover_${bookType}.pdf</FileName>
</Cover>
<Text>
<TotalExtent>${CFG.pages}</TotalExtent>
<ColourPages>${CFG.pages}</ColourPages>
<HeadTailBand>none</HeadTailBand>
<Ribbon>none</Ribbon>
<PaperName>140g_BD100</PaperName>
<FileName>${isbn}_Bookblock.pdf</FileName>
</Text>
</Title>
</CPI>`;

    /* -------- ORDER XML -------- */
    const orderXml = `<?xml version="1.0" encoding="utf-8"?>
<CPI>
<Header>
<FromCompany>${CFG.company}</FromCompany>
<FromCompanyNumber>${CFG.companyNo}</FromCompanyNumber>
<SentDate>${date}</SentDate>
<SentTime>${time}</SentTime>
<FromPerson>${CFG.person}</FromPerson>
<FromEmail>${CFG.email}</FromEmail>
</Header>
<DropShipOrder>
<OrderNumber>${order}</OrderNumber>
<Shipping>DHL Standard</Shipping>
<Product>
<EAN>${isbn}</EAN>
<Copies>1</Copies>
</Product>
<ShippingAddress>
<AddressLine1>${addr.name}</AddressLine1>
<AddressLine2></AddressLine2>
<Street>${addr.street}</Street>
<ZIP>${addr.zip}</ZIP>
<City>${addr.city}</City>
<Phone>${addr.phone}</Phone>
<Country>${addr.country}</Country>
</ShippingAddress>
</DropShipOrder>
</CPI>`;

    download(`${isbn}_MasteringOrder.xml`, mastering);
    download(`CPI_DropShipOrder_${order}.xml`, orderXml);

    msg.textContent = "✔ XML-Dateien erfolgreich erstellt";
    msg.classList.add("success");

  } catch(e) {
    msg.textContent = "❌ " + e;
    msg.classList.add("error");
  }
}

function download(name, text) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], {type:"application/xml"}));
  a.download = name;
  a.click();
}
</script>
</body>
</html>
