<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Storylio XML Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050816;
      --card-bg: #0b1020;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.18);
      --border-subtle: #1f2933;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        Segoe UI, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f2937 0, #050816 52%, #000 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 1080px;
    }

    .card {
      background: radial-gradient(circle at top left, #111827 0, #020617 60%);
      border-radius: 26px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(18px);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 2px 9px 3px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.55);
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 1.05fr;
      gap: 18px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .card {
        padding: 16px;
      }
    }

    .panel {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), #020617);
      border-radius: var(--radius-lg);
      padding: 14px;
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #c7d2fe;
      margin-bottom: 4px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    input,
    textarea {
      width: 100%;
      background: #020617;
      border-radius: var(--radius-md);
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 9px 11px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.5);
      background: #020617;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > div {
      flex: 1;
    }

    .pill-row {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      margin-bottom: 4px;
    }

    .pill {
      position: relative;
    }

    .pill input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .pill span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px 5px;
      border-radius: 999px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .pill input:checked + span {
      background: radial-gradient(circle at top left, #4f46e5, #6366f1);
      color: white;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 7px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      color: #e0e7ff;
      border: 1px solid rgba(129, 140, 248, 0.6);
      transition: background 0.15s, transform 0.08s ease-out, box-shadow 0.15s;
      box-shadow: 0 12px 25px rgba(30, 64, 175, 0.35);
    }

    button.primary {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 6px 16px rgba(30, 64, 175, 0.5);
    }

    button.secondary {
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(148, 163, 184, 0.6);
      box-shadow: none;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    textarea.readonly {
      min-height: 150px;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco,
        Consolas, "Liberation Mono", "Courier New", monospace;
      white-space: pre;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="header-row">
        <div>
          <h1>
            Storylio XML Generator
            <span class="badge">POD</span>
          </h1>
          <div class="subtitle">Schnell Mastering & DropShipOrder XML erzeugen.</div>
        </div>
      </div>

      <div class="grid">
        <!-- Eingaben -->
        <div class="panel">
          <div class="panel-title">Eingabe</div>

          <div>
            <label for="address">Versandadresse</label>
            <textarea
              id="address"
              placeholder="z. B.&#10;Daniela Hönig, Pöhlbergsiedlung 5, 09456 Annaberg-B., Deutschland"
            ></textarea>
          </div>

          <div class="row">
            <div>
              <label for="orderNumber">Shopify-Bestellnummer</label>
              <input
                id="orderNumber"
                type="text"
                placeholder="#St219732156"
                autocomplete="off"
              />
            </div>
            <div>
              <label for="childName">Name des Kindes</label>
              <input
                id="childName"
                type="text"
                placeholder="Nina"
                autocomplete="off"
              />
            </div>
          </div>

          <div>
            <label>Einband</label>
            <div class="pill-row">
              <label class="pill">
                <input type="radio" name="bookType" value="HC" checked />
                <span>Hardcover</span>
              </label>
              <label class="pill">
                <input type="radio" name="bookType" value="SC" />
                <span>Softcover</span>
              </label>
            </div>
          </div>

          <div>
            <label>Geschichte</label>
            <div class="pill-row" id="storyPills">
              <label class="pill">
                <input type="radio" name="storyType" value="pferde" checked />
                <span>🐴 Pferde</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="eisprinzessin" />
                <span❄>❄️ Eisprinzessin</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="meerjungfrauen" />
                <span>🧜‍♀️ Meerjungfrau</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="einhörner" />
                <span>🦄 Einhorn</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="prinzessin" />
                <span>👑 Prinzessin</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="feuerwehr" />
                <span>🚒 Feuerwehr</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="astronaut" />
                <span>🚀 Astronaut</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="dinosaurier" />
                <span>🦖 Dinosaurier</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="superheld" />
                <span>🦸‍♂️ Superheld</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="ritter" />
                <span>⚔️ Ritter</span>
              </label>
              <label class="pill">
                <input type="radio" name="storyType" value="pirat" />
                <span>🏴‍☠️ Pirat</span>
              </label>
            </div>
          </div>

          <div class="btn-row">
            <button class="primary" onclick="downloadBoth()">Beide XML herunterladen</button>
            <button class="secondary" onclick="downloadMastering()">Nur Mastering</button>
            <button class="secondary" onclick="downloadOrder()">Nur DropShipOrder</button>
          </div>

          <div class="hint">
            ISBN wird automatisch aus Präfix <code>9789000</code> + Bestellnummer erzeugt.
            Umfang ist fest auf 36 Seiten.
          </div>
        </div>

        <!-- Vorschau -->
        <div class="panel">
          <div class="panel-title">Vorschau</div>

          <div>
            <label for="masteringPreview">Mastering XML</label>
            <textarea id="masteringPreview" class="readonly" readonly></textarea>
          </div>

          <div>
            <label for="orderPreview">DropShipOrder XML</label>
            <textarea id="orderPreview" class="readonly" readonly></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const defaults = {
      fromCompany: "Storylio",
      fromCompanyNumber: "31174",
      fromPerson: "Amir Schariaty",
      fromEmail: "storylio.hilfe@gmail.com",
      isbnPrefix: "9789000",
      pages: 36,
    };

    const STORY_TITLES = {
      pferde: "NAME - Der Kampf um das Lieblingspferd",
      eisprinzessin: "NAME - Die Eisprinzessin und das Herz des Winters",
      meerjungfrauen: "NAME - Die Meerjungfrau",
      einhörner: "NAME - Die Reise zum Regenbogen",
      prinzessin: "NAME - Die Prinzessin",
      feuerwehr: "NAME - Das große Abenteuer im Einsatz",
      astronaut: "NAME - Der Astronaut",
      dinosaurier: "NAME - Eine magische Reise in eine uralte Welt",
      superheld: "NAME - Der Superheld in der Stadt",
      ritter: "NAME - Der Ritter",
      pirat: "NAME - Der Pirat",
    };

    function pad2(n) {
      return n.toString().padStart(2, "0");
    }

    function getNow() {
      const d = new Date();
      const year = d.getFullYear();
      const month = pad2(d.getMonth() + 1);
      const day = pad2(d.getDate());
      const hours = pad2(d.getHours());
      const minutes = pad2(d.getMinutes());
      return {
        date: `${year}${month}${day}`,
        time: `${hours}:${minutes}`,
      };
    }

    function sanitizeOrderNumber(raw) {
      if (!raw) return "";
      return raw.trim().replace(/^#/, "");
    }

    function extractDigits(str) {
      return (str || "").replace(/\D+/g, "");
    }

    function parseAddress(raw) {
      const parts = (raw || "")
        .split("\n")
        .join(" ")
        .split(",")
        .map((p) => p.trim())
        .filter((p) => p.length > 0);

      const [line1 = "", street = "", zipCity = "", country = ""] = parts;

      let zip = "";
      let city = "";
      if (zipCity) {
        const m = zipCity.match(/^(\S+)\s+(.+)$/);
        if (m) {
          zip = m[1];
          city = m[2];
        } else {
          city = zipCity;
        }
      }

      const countryMap = {
        deutschland: "DE",
        germany: "DE",
        schweiz: "CH",
        switzerland: "CH",
        österreich: "AT",
        austria: "AT",
      };

      let countryCode = "";
      const lower = country.toLowerCase();
      Object.keys(countryMap).forEach((key) => {
        if (lower.includes(key)) {
          countryCode = countryMap[key];
        }
      });
      if (!countryCode && country.length === 2) {
        countryCode = country.toUpperCase();
      }

      return {
        addressLine1: line1,
        street,
        zip,
        city,
        country: countryCode || country || "",
      };
    }

    function buildIsbn() {
      const orderRaw = sanitizeOrderNumber(
        document.getElementById("orderNumber").value
      );
      const suffixDigits = extractDigits(orderRaw);
      return defaults.isbnPrefix + suffixDigits;
    }

    function getSelectedStoryType() {
      const el = document.querySelector('input[name="storyType"]:checked');
      return el ? el.value : "pferde";
    }

    function getStoryTitle(childName, storyType) {
      const template =
        STORY_TITLES[storyType] || "NAME - Deine Geschichte";
      const name = childName && childName.trim() ? childName.trim() : "NAME";
      return template.replace("NAME", name);
    }

    function buildMasteringXml() {
      const { date, time } = getNow();
      const orderRaw = sanitizeOrderNumber(
        document.getElementById("orderNumber").value
      );
      const childName = document.getElementById("childName").value.trim();
      const isbn = buildIsbn();

      const bookType = document.querySelector(
        'input[name="bookType"]:checked'
      ).value;

      const storyType = getSelectedStoryType();
      const titleText = getStoryTitle(childName, storyType);

      const pages = defaults.pages;
      const isHC = bookType === "HC";
      const coverPaper = isHC ? "150g_BD100" : "275g_BD100";
      const textPaper = "140g_BD100";

      const coverFile = `${isbn}_Cover_${bookType}.pdf`;
      const textFile = `${isbn}_Bookblock.pdf`;

      const xml = `<?xml version="1.0" encoding="UTF-8"?>
<CPI>
  <Header>
    <FromCompany>${defaults.fromCompany}</FromCompany>
    <FromCompanyNumber>${defaults.fromCompanyNumber}</FromCompanyNumber>
    <SentDate>${date}</SentDate>
    <SentTime>${time}</SentTime>
    <FromPerson>${defaults.fromPerson}</FromPerson>
    <FromEmail>${defaults.fromEmail}</FromEmail>
  </Header>

  <Title>
    <Type>import</Type>
    <ISBN>${isbn}</ISBN>
    <Author>${defaults.fromCompany}</Author>
    <Title>${titleText}</Title>
    <Height>200</Height>
    <Width>200</Width>
    <BookType>${bookType}</BookType>
    <Backing>straight</Backing>

    <Cover>
      <Pages>1</Pages>
      <Lamination>glossy</Lamination>
      <PaperName>${coverPaper}</PaperName>
      <FileName>${coverFile}</FileName>
      <BarcodePosition>bottom-right</BarcodePosition>
    </Cover>

    <Text>
      <TotalExtent>${pages}</TotalExtent>
      <ColourPages>${pages}</ColourPages>
      <HeadTailBand>${isHC ? "none" : "none"}</HeadTailBand>
      <Ribbon>${isHC ? "none" : "none"}</Ribbon>
      <PaperName>${textPaper}</PaperName>
      <FileName>${textFile}</FileName>
    </Text>
  </Title>
</CPI>`;

      return { xml, isbn, orderNumber: orderRaw };
    }

    function buildOrderXml() {
      const { date, time } = getNow();
      const orderRaw = sanitizeOrderNumber(
        document.getElementById("orderNumber").value
      );
      const isbn = buildIsbn();
      const addressRaw = document.getElementById("address").value;
      const addr = parseAddress(addressRaw);

      const xml = `<?xml version="1.0" encoding="utf-8"?>
<CPI>
  <Header>
    <FromCompany>${defaults.fromCompany}</FromCompany>
    <FromCompanyNumber>${defaults.fromCompanyNumber}</FromCompanyNumber>
    <SentDate>${date}</SentDate>
    <SentTime>${time}</SentTime>
    <FromPerson>${defaults.fromPerson}</FromPerson>
    <FromEmail>${defaults.fromEmail}</FromEmail>
  </Header>

  <DropShipOrder>
    <OrderNumber>${orderRaw}</OrderNumber>
    <Shipping>DHL Standard</Shipping>
    <InvoiceFile></InvoiceFile>

    <Product>
      <EAN>${isbn}</EAN>
      <Copies>1</Copies>
    </Product>

    <ShippingAddress>
      <AddressLine1>${addr.addressLine1}</AddressLine1>
      <AddressLine2></AddressLine2>
      <Street>${addr.street}</Street>
      <ZIP>${addr.zip}</ZIP>
      <City>${addr.city}</City>
      <Phone></Phone>
      <Country>${addr.country}</Country>
    </ShippingAddress>
  </DropShipOrder>
</CPI>`;

      return { xml, isbn, orderNumber: orderRaw };
    }

    function refreshPreviews() {
      const m = buildMasteringXml();
      const o = buildOrderXml();
      document.getElementById("masteringPreview").value = m.xml;
      document.getElementById("orderPreview").value = o.xml;
    }

    function downloadTextFile(filename, content) {
      const blob = new Blob([content], { type: "application/xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadMastering() {
      const { xml, isbn } = buildMasteringXml();
      const filename = `${isbn}_MasteringOrder.xml`;
      downloadTextFile(filename, xml);
      refreshPreviews();
    }

    function downloadOrder() {
      const { xml, orderNumber } = buildOrderXml();
      const filename = `CPI_DropShipOrder_${orderNumber || "Order"}.xml`;
      downloadTextFile(filename, xml);
      refreshPreviews();
    }

    function downloadBoth() {
      downloadMastering();
      downloadOrder();
    }

    ["address", "orderNumber", "childName"].forEach((id) => {
      const el = document.getElementById(id);
      el.addEventListener("input", refreshPreviews);
    });

    document
      .querySelectorAll('input[name="bookType"]')
      .forEach((el) => el.addEventListener("change", refreshPreviews));

    document
      .querySelectorAll('input[name="storyType"]')
      .forEach((el) => el.addEventListener("change", refreshPreviews));

    window.addEventListener("load", refreshPreviews);
  </script>
</body>
</html>
